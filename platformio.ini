; ============================================================================
; PlayMode — PlatformIO Configuration
; ============================================================================
;
; Dual-core ESP32 architecture:
;   Core 0: WiFi, MIDI parsing, Power Manager, Web UI (loop)
;   Core 1: Real-time Scheduler, PCA/I²C, Safety Manager
;

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

; All source files are flat in play-mode/
; Compatible with Arduino IDE and PlatformIO without additional configuration.
src_dir = play-mode

; Third-party libraries
lib_deps =
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit PWM Servo Driver Library@^2
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    lathoub/AppleMIDI@^3

; Serial upload speed
monitor_speed = 115200
upload_speed = 921600
