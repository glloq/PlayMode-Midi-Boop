; ============================================================================
; PlayMode Midi B∞p — PlatformIO Configuration
; ============================================================================
;
; Architecture dual-core ESP32 :
;   Core 0 : WiFi, MIDI parsing, Power Manager, Web UI (loop)
;   Core 1 : Scheduler temps réel, PCA/I²C, Safety Manager
;

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino

; Le fichier .ino reste à la racine de midi-boop/
src_dir = midi-boop

; Chemins d'inclusion pour que les #include "header.h" existants
; continuent de fonctionner après la restructuration en sous-dossiers
build_flags =
    -Imidi-boop/config
    -Imidi-boop/drivers
    -Imidi-boop/actuators
    -Imidi-boop/scheduler
    -Imidi-boop/midi
    -Imidi-boop/managers
    -Imidi-boop/network
    -Imidi-boop/web
    -Imidi-boop/tools
    -Imidi-boop/log

; Bibliothèques tierces
lib_deps =
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit PWM Servo Driver Library@^2
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    lathoub/AppleMIDI@^3

; Vitesse upload série
monitor_speed = 115200
upload_speed = 921600
